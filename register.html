<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ನೋಂದಣಿ | ಕನ್ನಡ ಬಳಗ 2026</title>

<style>

body{
font-family:Arial;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.6)),
url("redyello.jpg");
background-size:cover;
background-position:center;
color:white;
text-align:center;
padding:50px;
}

.container{
max-width:500px;
margin:auto;
background:rgba(0,0,0,0.7);
padding:30px;
border-radius:10px;
}

input, select{
width:100%;
padding:12px;
margin:10px 0;

border-radius:5px;
}

button{
background:#ff9800;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
font-size:16px;

}

button:hover{

}

a{
color:#ff9800;
display:block;

}

</style>
</head>

<body>

<div class="container">

<h1>ಕನ್ನಡ ಬಳಗ 2026 ನೋಂದಣಿ</h1>

<form onsubmit="showSuccess(); return false;">

<input type="text" placeholder="ಹೆಸರು" required>

<input type="email" placeholder="ಇಮೇಲ್" required>

<input type="tel" placeholder="ದೂರವಾಣಿ ಸಂಖ್ಯೆ" required>

<input type="text" placeholder="ಕಾಲೇಜಿನ ಹೆಸರು" required>

<select required>
<option>ಕಾರ್ಯಕ್ರಮ ಆಯ್ಕೆಮಾಡಿ</option>
<option>ಭಾಷಣ ಸ್ಪರ್ಧೆ</option>
<option>ಕ್ವಿಜ್</option>
<option>ನಾಟಕ</option>

</select>

<button type="submit">ಸಲ್ಲಿಸಿ</button>

</form>

</div>
