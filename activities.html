<!DOCTYPE html>
<html lang="kn">

<head>
<title>ಕಾರ್ಯಕ್ರಮಗಳು</title>
<link rel="stylesheet" href="style.css">
</head>
<style>
    body{
background:linear-gradient(135deg,#8b0000,#ffcc00);
min-height:100vh;
font-family:'Noto Sans Kannada', sans-serif;
color:white;
text-align:center;
padding:40px;
}

/* TITLE */

h1{
font-size:40px;
margin-bottom:40px;
}

/* EVENTS CONTAINER */

.events{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

/* CARD DESIGN */

.card{
background:transparent;
color:black;
padding:25px;
width:280px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
transition:0.3s;
}

/* HOVER EFFECT */

.card:hover{
transform:translateY(-10px) scale(1.03);
}

/* EVENT TIME */

.time{
font-size:18px;
margin-top:10px;
color:color-mix(in srgb-linear, right-decor percentage, color percentage)
}

/* MOBILE */

@media(max-width:768px){

.events{
flex-direction:column;
align-items:center;
}

.card{
width:90%;
}

}
</style>

<body>

<h1>ಕಾರ್ಯಕ್ರಮಗಳು</h1>

<div class="events">

<div class="card">
<h2>1️⃣ ಔಪಚಾರಿಕ ಉದ್ಘಾಟನೆ </h2>
<p class="time">⏰ 10:00 AM</p>
</div>

<div class="card">
<h2>2️⃣ ಭುವನೇಶ್ವರಿ ದೇವಿ ಮೂರ್ತಿ ಪೂಜೆ ಮತ್ತು ರ್ಯಾಲಿ</h2>
<p class="time">⏰ 01:00 PM</p>
</div>



<div class="card">
<h2>4️⃣ ಸಾಂಸ್ಕೃತಿಕ ಕಾರ್ಯಕ್ರಮ</h2>
<p class="time">⏰ 02:30 PM</p>
</div>

<div class="card">
<h2>5️⃣ ಕಾರ್ಯಕ್ರಮ ಸಮಾಪ್ತಿ</h2>
<p class="time">⏰ 06:00 PM</p>
</div>

</div>

</body>
</html>
